<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Крестики-нолики</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      min-height: 1.6rem;
      color: #a8dadc;
    }

    #scoreboard {
      display: flex;
      gap: 32px;
      align-items: center;
    }

    .score-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .score-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #0f3460;
    }

    .score-p1 .score-avatar { border-color: #e94560; }
    .score-p2 .score-avatar { border-color: #a8dadc; }

    .score-num {
      font-size: 1.1rem;
      font-weight: bold;
    }

    .score-p1 .score-num { color: #e94560; }
    .score-p2 .score-num { color: #a8dadc; }
    .score-tie { color: #aaa; font-size: 1rem; text-align: center; }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
    }

    .cell.p1 { border-color: #e94560; }
    .cell.p2 { border-color: #a8dadc; }

    .cell.winner {
      border-width: 3px;
      animation: pulse 0.5s ease;
    }

    .cell.p1.winner { border-color: #e94560; box-shadow: 0 0 12px #e94560; }
    .cell.p2.winner { border-color: #a8dadc; box-shadow: 0 0 12px #a8dadc; }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    #restart {
      padding: 10px 32px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s, transform 0.1s;
    }

    #restart:hover {
      background: #c73652;
      transform: scale(1.04);
    }
  </style>
</head>

      <span class="score-num"><span id="score-p2">0</span></span>
    </div>
  </div>

  <div id="status"></div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="restart">Новая игра</button>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    const PLAYERS = {
      '1': { img: 'Player 1.jpg', cls: 'p1', label: 'Игрок 1' },
      '2': { img: 'Player 2.jpg', cls: 'p2', label: 'Игрок 2' }
    };

    let board, current, over;
    const scores = { '1': 0, '2': 0, tie: 0 };

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');

    function setStatus(text) { status.textContent = text; }

    function init() {
      board = Array(9).fill('');
      current = '1';
      over = false;
      cells.forEach(c => {
        c.innerHTML = '';
        c.className = 'cell';
      });
      setStatus(`Ход: ${PLAYERS[current].label}`);
    }

    function checkWin() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c])
          return [a, b, c];
      }
      return null;
    }

    function updateScores() {
      document.getElementById('score-p1').textContent = scores['1'];
      document.getElementById('score-p2').textContent = scores['2'];
      document.getElementById('score-tie').textContent = scores.tie;
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (over || board[i]) return;

        board[i] = current;
        const p = PLAYERS[current];
        const img = document.createElement('img');
        img.src = p.img;
        img.alt = p.label;
        cell.appendChild(img);
        cell.classList.add('taken', p.cls);

        const win = checkWin();
        if (win) {
          win.forEach(idx => cells[idx].classList.add('winner'));
          setStatus(`${p.label} побеждает!`);
          scores[current]++;
          updateScores();
          over = true;
        } else if (board.every(Boolean)) {
          setStatus('Ничья!');
          scores.tie++;
          updateScores();
          over = true;
        } else {
          current = current === '1' ? '2' : '1';
          setStatus(`Ход: ${PLAYERS[current].label}`);
        }
      });
    });

    document.getElementById('restart').addEventListener('click', init);

    init();
  </script>
</body>
</html>
