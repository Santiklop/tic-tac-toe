<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Бей крота!</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .screen { display: none; flex-direction: column; align-items: center; gap: 24px; padding: 20px; }
    .screen.active { display: flex; }

    h1 {
      font-size: clamp(2rem, 8vw, 3rem);
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e94560;
      text-shadow: 0 0 20px rgba(233,69,96,0.5);
    }
    .subtitle { color: #a8dadc; font-size: 1.1rem; text-align: center; line-height: 1.6; }

    #hud {
      display: flex;
      gap: 32px;
      align-items: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid #0f3460;
      border-radius: 16px;
      padding: 12px 32px;
    }
    .hud-block { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .hud-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #a8dadc; opacity: 0.7; }
    #score, #best, #timer { font-size: 2rem; font-weight: bold; color: #eee; min-width: 50px; text-align: center; }
    #timer { color: #a8dadc; }
    .hud-timer.warning #timer { color: #e94560; animation: blink 0.5s step-end infinite; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      padding: 8px;
    }

    .hole {
      width: 120px;
      height: 120px;
      background: #16213e;
      border: 3px solid #0f3460;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.15s;
    }
    .hole:hover { border-color: #1a4a7a; }

    .mole {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(100%);
      width: 104px;
      height: 104px;
      transition: transform 0.12s cubic-bezier(0.22, 0.61, 0.36, 1);
      pointer-events: none;
    }
    .mole img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
      pointer-events: none;
    }
    .hole.up .mole {
      transform: translateX(-50%) translateY(8%);
    }

    @keyframes hitflash {
      0%   { background: #e94560; box-shadow: 0 0 24px #e94560; border-color: #e94560; }
      100% { background: #16213e; box-shadow: none; border-color: #0f3460; }
    }
    .hole.hit { animation: hitflash 0.3s ease forwards; }

    @keyframes scorepop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.5); color: #e94560; }
      100% { transform: scale(1); }
    }
    .score-pop { animation: scorepop 0.25s ease; }

    button {
      padding: 14px 48px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.2rem;
      cursor: pointer;
      letter-spacing: 1px;
      font-weight: bold;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 4px 15px rgba(233,69,96,0.4);
    }
    button:hover { background: #c73652; transform: scale(1.05); box-shadow: 0 6px 20px rgba(233,69,96,0.6); }
    button:active { transform: scale(0.98); }

    #final-score-line { font-size: 1.5rem; text-align: center; }
    #final-score { color: #e94560; font-weight: bold; font-size: 2rem; }
    #best-score-line { font-size: 1rem; color: #a8dadc; text-align: center; }
    #best-over { font-weight: bold; }

    @media (max-width: 420px) {
      .hole { width: 90px; height: 90px; }
      .mole { width: 78px; height: 78px; }
      #grid { gap: 10px; }
      #hud { gap: 20px; padding: 10px 20px; }
    }
  </style>
</head>
<body>

  <div id="screen-start" class="screen active">
    <h1>Бей крота!</h1>
    <p class="subtitle">У тебя 60 секунд.<br>Жми быстрее!</p>
    <button id="btn-start">Начать игру</button>
  </div>

  <div id="screen-game" class="screen">
    <h1>Бей крота!</h1>
    <div id="hud">
      <div class="hud-block">
        <span class="hud-label">Счёт</span>
        <span id="score">0</span>
      </div>
      <div class="hud-block">
        <span class="hud-label">Лучший</span>
        <span id="best">0</span>
      </div>
      <div class="hud-block hud-timer" id="timer-block">
        <span class="hud-label">Время</span>
        <span id="timer">60</span>
      </div>
    </div>
    <div id="grid"></div>
  </div>

  <div id="screen-over" class="screen">
    <h1>Игра окончена!</h1>
    <p id="final-score-line">Твой счёт: <span id="final-score">0</span></p>
    <p id="best-score-line">Лучший результат: <span id="best-over">0</span></p>
    <button id="btn-restart">Играть снова</button>
  </div>

    const TOTAL_TIME  = 60;
    const HOLES_COUNT = 9;
    const DIFFICULTY  = [
      { above: 45, spawn: 1200, visible: 900  },
      { above: 30, spawn:  950, visible: 750  },
      { above: 15, spawn:  750, visible: 600  },
      { above:  0, spawn:  550, visible: 450  },
    ];

    let score = 0;
    let best  = parseInt(localStorage.getItem('mole_best') || '0', 10);
    let timeLeft = TOTAL_TIME;
    let spawnTimer = null;
    let countdownTimer = null;
    let activeTimeouts = [];
    let currentSpawnInterval = null;
    const holes = [];

    function getDifficulty() {
      return DIFFICULTY.find(d => timeLeft > d.above) || DIFFICULTY[DIFFICULTY.length - 1];
    }

    function randomImg() {
      return MOLE_IMGS[Math.floor(Math.random() * MOLE_IMGS.length)];
    }

    function spawnMole() {
      const down = holes.filter(h => !h.classList.contains('up'));
      if (!down.length) return;
      const hole = down[Math.floor(Math.random() * down.length)];
      hole.querySelector('img').src = randomImg();
      hole.classList.add('up');
      const t = setTimeout(() => hole.classList.remove('up'), getDifficulty().visible);
      activeTimeouts.push(t);
    }

    function updateSpawnRate() {
      const { spawn } = getDifficulty();
      if (spawn === currentSpawnInterval) return;
      currentSpawnInterval = spawn;
      clearInterval(spawnTimer);
      spawnTimer = setInterval(spawnMole, spawn);
    }

    function tick() {
      timeLeft--;
      document.getElementById('timer').textContent = timeLeft;
      if (timeLeft <= 10) document.getElementById('timer-block').classList.add('warning');
      updateSpawnRate();
      if (timeLeft <= 0) endGame();
    }

    function startGame() {
      score = 0;
      timeLeft = TOTAL_TIME;
      currentSpawnInterval = null;
      document.getElementById('score').textContent = 0;
      document.getElementById('best').textContent = best;
      document.getElementById('timer').textContent = TOTAL_TIME;
      document.getElementById('timer-block').classList.remove('warning');
      holes.forEach(h => h.classList.remove('up', 'hit'));
      showScreen('screen-game');
      spawnMole();
      const { spawn } = getDifficulty();
      currentSpawnInterval = spawn;
      spawnTimer = setInterval(spawnMole, spawn);
      countdownTimer = setInterval(tick, 1000);
    }

    function endGame() {
      clearInterval(spawnTimer);
      clearInterval(countdownTimer);
      activeTimeouts.forEach(clearTimeout);
      activeTimeouts = [];
      holes.forEach(h => h.classList.remove('up', 'hit'));
      if (score > best) {
        best = score;
        localStorage.setItem('mole_best', best);
      }
      document.getElementById('final-score').textContent = score;
      document.getElementById('best-over').textContent = best;
      showScreen('screen-over');
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function popScore() {
      const el = document.getElementById('score');
      el.classList.remove('score-pop');
      void el.offsetWidth;
      el.classList.add('score-pop');
      setTimeout(() => el.classList.remove('score-pop'), 260);
    }

    document.addEventListener('DOMContentLoaded', () => {
      const grid = document.getElementById('grid');
      for (let i = 0; i < HOLES_COUNT; i++) {
        const hole = document.createElement('div');
        hole.className = 'hole';
        const mole = document.createElement('div');
        mole.className = 'mole';
        const img = document.createElement('img');
        img.src = MOLE_IMGS[i % MOLE_IMGS.length];
        img.alt = 'крот';
        img.draggable = false;
        mole.appendChild(img);
        hole.appendChild(mole);
        grid.appendChild(hole);
        holes.push(hole);

        hole.addEventListener('click', () => {
          if (!hole.classList.contains('up')) return;
          hole.classList.remove('up');
          hole.classList.add('hit');
          setTimeout(() => hole.classList.remove('hit'), 310);
          score++;
          document.getElementById('score').textContent = score;
          popScore();
          if (score > best) {
            best = score;
            localStorage.setItem('mole_best', best);
            document.getElementById('best').textContent = best;
          }
        });
      }

      document.getElementById('btn-start').addEventListener('click', startGame);
      document.getElementById('btn-restart').addEventListener('click', startGame);
    });
  </script>
</body>
</html>
